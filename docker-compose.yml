# Exemple de compose pour développement local (utilise l'image GHCR pré-buildée)
services:
  web:
    image: ghcr.io/charlesbinard/neondojo:latest
    container_name: neondojo
    restart: unless-stopped
    ports:
      - "3000:80"
    # Uncomment and set for HTTPS termination via reverse proxy:
      # VIRTUAL_HOST: rywoox.com
      # LETSENCRYPT_HOST: rywoox.com
    # For bind-mounted assets (optional):
    # volumes:
    #   - ./dist:/usr/share/nginx/html:ro
